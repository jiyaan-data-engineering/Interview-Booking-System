<svg viewBox="0 0 1400 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Dark background -->
  <rect width="1400" height="450" fill="#0f172a"/>

  <!-- Logo section background -->
  <rect x="30" y="30" width="380" height="390" rx="40" fill="#1e3a5f" opacity="0.4" stroke="#3b82f6" stroke-width="2"/>

  <!-- Logo: Network nodes and connections -->
  <g transform="translate(220, 225)">
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="61" y2="-35" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="61" y2="35" stroke="#ef4444" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="70" stroke="#10b981" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="-61" y2="35" stroke="#ef4444" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="-61" y2="-35" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#60a5fa"/>

    <!-- Top node (green) -->
    <circle cx="0" cy="-70" r="18" fill="#10b981" stroke="#34d399" stroke-width="2"/>

    <!-- Top-right node (yellow) -->
    <circle cx="61" cy="-35" r="18" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>

    <!-- Bottom-right node (red) -->
    <circle cx="61" cy="35" r="18" fill="#ef4444" stroke="#f87171" stroke-width="2"/>

    <!-- Bottom node (green) -->
    <circle cx="0" cy="70" r="18" fill="#10b981" stroke="#34d399" stroke-width="2"/>

    <!-- Bottom-left node (red) -->
    <circle cx="-61" cy="35" r="18" fill="#ef4444" stroke="#f87171" stroke-width="2"/>

    <!-- Top-left node (blue) -->
    <circle cx="-61" cy="-35" r="18" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  </g>

  <!-- Divider line -->
  <line x1="450" y1="30" x2="450" y2="420" stroke="#475569" stroke-width="3"/>

  <!-- Text section -->
  <g>
    <!-- JIYAAN text -->
    <text x="530" y="130" font-size="85" font-weight="900" fill="white" font-family="Arial, sans-serif" letter-spacing="3">JIYAAN</text>

    <!-- INSTITUTE OF TECHNOLOGY -->
    <text x="530" y="210" font-size="38" font-weight="bold" fill="white" font-family="Arial, sans-serif" letter-spacing="1">INSTITUTE OF TECHNOLOGY</text>

    <!-- Colored underline for INSTITUTE OF TECHNOLOGY -->
    <rect x="530" y="225" width="75" height="5" fill="#3b82f6"/>
    <rect x="610" y="225" width="75" height="5" fill="#10b981"/>
    <rect x="690" y="225" width="75" height="5" fill="#f59e0b"/>
    <rect x="770" y="225" width="75" height="5" fill="#ef4444"/>

    <!-- GCP DATA ENGINEERING EXCELLENCE -->
    <text x="530" y="290" font-size="18" font-weight="500" fill="#9ca3af" font-family="Arial, sans-serif" letter-spacing="2">GCP DATA ENGINEERING EXCELLENCE</text>
  </g>
</svg>